<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRIAM ギフト耐久チェッカー</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f5f5f5;color:#111}
header{position:sticky;top:0;background:rgba(245,245,245,.96);backdrop-filter:blur(8px);z-index:10;padding:14px 12px;border-bottom:1px solid #ddd}
h1{font-size:22px;margin:0 0 10px}
.status{font-weight:800;margin-bottom:10px;font-size:16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
button{border:0;border-radius:12px;background:white;padding:10px 14px;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.12);cursor:pointer}
button.active{background:#1e88ff;color:white}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center}
main{padding:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:12px}
.card{position:relative;background:white;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.14);min-height:116px;display:flex;flex-direction:column;justify-content:space-between}
.card img{width:100%;display:block;background:white}
.card.done img{filter:grayscale(100%) opacity(.35)}
.card.done::after{
 content:"❌";
 position:absolute;
 inset:0;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:58px;
 color:red;
 font-weight:bold;
 text-shadow:0 0 8px white,0 0 8px white;
 pointer-events:none;
}
.name{font-size:12px;text-align:center;font-weight:800;padding:5px 2px 7px;background:white}
@media(min-width:700px){
 .grid{grid-template-columns:repeat(auto-fill,minmax(112px,1fr));}
 .card.done::after{font-size:74px}
}
</style>
</head>

</div>
</header>

const categories = {"love": "LOVE", "stage": "ステージ", "greet": "挨拶", "great": "えらい", "classic": "定番", "laugh": "笑", "neta": "ネタ"};
let currentTab = "all";
let done = JSON.parse(localStorage.getItem("iriamGiftDone_v2") || "{}");

function save() {
  localStorage.setItem("iriamGiftDone_v2", JSON.stringify(done));
}

function makeTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.textContent = "全カテゴリー";
  allBtn.onclick = () => { currentTab="all"; render(); };
  allBtn.dataset.tab = "all";
  tabs.appendChild(allBtn);

  for (const [key, label] of Object.entries(categories)) {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.onclick = () => { currentTab=key; render(); };
    btn.dataset.tab = key;
    tabs.appendChild(btn);
  }
}

function render() {
  document.querySelectorAll("#tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === currentTab);
  });

  const hideDone = document.getElementById("hideDone").checked;
  const list = gifts.filter(g => currentTab === "all" || g.category === currentTab);
  const shown = list.filter(g => !(hideDone && done[g.id]));

  const completed = list.filter(g => done[g.id]).length;
  const percent = list.length ? Math.round(completed / list.length * 100) : 0;
  document.getElementById("status").textContent = `達成率：${completed} / ${list.length}（${percent}%）`;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (const g of shown) {
    const card = document.createElement("div");
    card.className = "card" + (done[g.id] ? " done" : "");
    card.onclick = () => {
      done[g.id] = !done[g.id];
      if (!done[g.id]) delete done[g.id];
      save();
      render();
    };

    const img = document.createElement("img");
    img.src = g.image;
    img.alt = g.name;

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = g.name;

    card.appendChild(img);
    card.appendChild(name);
    grid.appendChild(card);
  }
}

function resetAll() {
  if(confirm("取得済みを全部リセットしますか？")) {
    done = {};
    save();
    render();
  }
}

makeTabs();
render();
</script>
