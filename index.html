<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIAM ギフト耐久チェッカー</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f5f5;
  color:#111;
}

header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(245,245,245,.96);
  backdrop-filter:blur(8px);
  padding:14px;
  border-bottom:1px solid #ddd;
}

.title-row{
  display:flex;
  align-items:flex-end;
  gap:14px;
  flex-wrap:wrap;
}

.update-date{
  font-size:14px;
  color:#666;
  font-weight:600;
  margin-bottom:10px;
}

h1{
  font-size:22px;
  margin:0 0 10px;
}

.progress{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.tab{
  border:none;
  border-radius:18px;
  padding:14px 24px;
  background:#fff;
  font-size:16px;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
}

.tab.active{
  background:#2487ff;
  color:#fff;
}

.options{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

.reset-btn{
  border:none;
  border-radius:18px;
  padding:12px 22px;
  background:#fff;
  font-size:15px;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
}

main{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:18px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  text-align:center;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
}
</style>
</head>

<body>

<header>

<div class="title-row">
  <h1>IRIAM ギフト耐久チェッカー</h1>
  <div class="update-date">更新日：2026/06/08</div>
</div>

<div class="progress">
  達成率：0 / 407（0%）
</div>

<div class="tabs">
  <button class="tab active">全カテゴリー</button>
  <button class="tab">ネタ</button>
  <button class="tab">LOVE</button>
  <button class="tab">ステージ</button>
  <button class="tab">挨拶</button>
  <button class="tab">えらい</button>
  <button class="tab">笑</button>
  <button class="tab">定番</button>
</div>

<div class="options">
  <label>
    <input type="checkbox">
    未取得のみ表示
  </label>

  <button class="reset-btn">全リセット</button>
</div>

</header>

<main>

<div class="grid">
  <div class="card"><img src="gifts/neta/neta_001.png"></div>
  <div class="card"><img src="gifts/love/love_001.png"></div>
  <div class="card"><img src="gifts/stage/stage_001.png"></div>
</div>

</main>

</body>
</html>
