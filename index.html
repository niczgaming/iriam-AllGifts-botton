
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIAM Gifts</title>
<style>
body{
    background:#111;
    color:white;
    font-family:sans-serif;
    margin:0;
    padding:20px;
}
h1{
    margin-bottom:30px;
}
.category{
    margin-bottom:50px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:20px;
}
.card{
    background:#222;
    border-radius:12px;
    padding:10px;
    text-align:center;
}
.card img{
    width:100%;
    background:white;
    border-radius:10px;
}
.name{
    margin-top:8px;
    font-size:12px;
    word-break:break-all;
}
</style>
</head>
<body>
<h1>IRIAM Gift Collection</h1>

    <div class="category">
        <h2>NETA</h2>
        <div class="grid" id="neta"></div>
    </div>

    <script>
    const netaContainer = document.getElementById("neta");

    for(let i=1;i<=300;i++){
        const num = String(i).padStart(3,"0");
        const path = `gifts/neta/neta_${num}.png`;

        const img = new Image();

        img.onload = function(){
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${path}" alt="${path}">
                <div class="name">neta_${num}.png</div>
            `;

            netaContainer.appendChild(card);
        }

        img.src = path;
    }
    </script>
