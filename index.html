<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRIAM ギフト耐久チェッカー</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f5f5f5;color:#111}
header{position:sticky;top:0;z-index:20;background:rgba(245,245,245,.96);backdrop-filter:blur(8px);padding:12px;border-bottom:1px solid #ddd}
h1{font-size:22px;margin:0 0 8px}
.status{font-weight:800;margin-bottom:8px}
.tabs,.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{border:0;border-radius:12px;background:white;padding:10px 14px;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.12);cursor:pointer}
button.active{background:#1e88ff;color:white}
main{padding:14px}
.panel{background:white;border-radius:16px;margin:0 0 18px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.13)}
.panel.hidden{display:none}
.stage{position:relative;width:100%;line-height:0}
.stage img{width:100%;display:block;user-select:none}
.hit{position:absolute;border-radius:10px;cursor:pointer;line-height:1}
.hit.done{background:rgba(160,160,160,.45)}
.hit.done::after{
 content:"❌";
 position:absolute;
 inset:0;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:clamp(32px,7vw,76px);
 color:red;
 font-weight:900;
 text-shadow:0 0 8px white,0 0 8px white;
 pointer-events:none;
}
.panel-title{font-weight:900;font-size:24px;padding:12px 14px;text-align:center}
</style>
</head>
<body>
<header>
<h1>IRIAM ギフト耐久チェッカー</h1>
<div class="status" id="status">達成率：0 / 0（0%）</div>
<div class="tabs" id="tabs"></div>
<div class="controls">
<label><input type="checkbox" id="hideDone" onchange="render()"> 未取得のみ表示</label>
<button onclick="resetAll()">全リセット</button>
</div>
</header>
<main id="main"></main>

<script>
const categories = {"love": {"label": "LOVE", "image": "love.webp", "size": [1200, 675], "count": 20, "x0": 34, "y0": 150, "sx": 146, "sy": 160, "w": 110, "h": 130, "cols": 8}, "stage": {"label": "ステージ", "image": "stage.webp", "size": [1200, 675], "count": 42, "x0": 25, "y0": 175, "sx": 99, "sy": 104, "w": 76, "h": 92, "cols": 12}, "greet": {"label": "挨拶", "image": "greet.webp", "size": [1200, 675], "count": 35, "x0": 43, "y0": 196, "sx": 91, "sy": 107, "w": 72, "h": 92, "cols": 12}, "great": {"label": "えらい", "image": "great.webp", "size": [1200, 675], "count": 48, "x0": 34, "y0": 185, "sx": 96, "sy": 115, "w": 76, "h": 94, "cols": 12}, "classic": {"label": "定番", "image": "classic.webp", "size": [1200, 958], "count": 147, "x0": 24, "y0": 140, "sx": 69, "sy": 73, "w": 58, "h": 66, "cols": 17}, "laugh": {"label": "笑", "image": "laugh.webp", "size": [1200, 675], "count": 19, "x0": 27, "y0": 176, "sx": 146, "sy": 160, "w": 107, "h": 130, "cols": 8}, "neta": {"label": "ネタ", "image": "neta.webp", "size": [1200, 900], "count": 96, "x0": 24, "y0": 136, "sx": 100, "sy": 107, "w": 74, "h": 95, "cols": 12}};
let currentTab = "all";
let done = JSON.parse(localStorage.getItem("iriamGiftOverlayDone_v1") || "{}");

function save(){ localStorage.setItem("iriamGiftOverlayDone_v1", JSON.stringify(done)); }

function makeTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";
  const all=document.createElement("button");
  all.textContent="全カテゴリー";
  all.dataset.tab="all";
  all.onclick=()=>{currentTab="all";render();};
  tabs.appendChild(all);
  for(const [key,c] of Object.entries(categories)){
    const b=document.createElement("button");
    b.textContent=c.label;
    b.dataset.tab=key;
    b.onclick=()=>{currentTab=key;render();};
    tabs.appendChild(b);
  }
}

function makeHit(catKey, c, i){
  const id=catKey+"_"+i;
  const col=(i-1)%c.cols;
  const row=Math.floor((i-1)/c.cols);
  const x=c.x0+col*c.sx;
  const y=c.y0+row*c.sy;
  const hit=document.createElement("div");
  hit.className="hit"+(done[id]?" done":"");
  hit.dataset.id=id;
  hit.style.left=(x/c.size[0]*100)+"%";
  hit.style.top=(y/c.size[1]*100)+"%";
  hit.style.width=(c.w/c.size[0]*100)+"%";
  hit.style.height=(c.h/c.size[1]*100)+"%";
  hit.title=c.label+" "+i;
  hit.onclick=(e)=>{
    e.stopPropagation();
    done[id]=!done[id];
    if(!done[id]) delete done[id];
    save();
    render();
  };
  return hit;
}

function render(){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===currentTab));
  const main=document.getElementById("main");
  main.innerHTML="";
  let total=0, completed=0;

  for(const [key,c] of Object.entries(categories)){
    if(currentTab!=="all" && currentTab!==key) continue;
    total+=c.count;
    for(let i=1;i<=c.count;i++) if(done[key+"_"+i]) completed++;

    const panel=document.createElement("section");
    panel.className="panel";
    const stage=document.createElement("div");
    stage.className="stage";
    const img=document.createElement("img");
    img.src=c.image;
    img.alt=c.label;
    stage.appendChild(img);

    for(let i=1;i<=c.count;i++){
      if(document.getElementById("hideDone").checked && done[key+"_"+i]) continue;
      stage.appendChild(makeHit(key,c,i));
    }

    const title=document.createElement("div");
    title.className="panel-title";
    title.textContent=c.label;

    panel.appendChild(stage);
    panel.appendChild(title);
    main.appendChild(panel);
  }

  const percent=total?Math.round(completed/total*100):0;
  document.getElementById("status").textContent=`達成率：${completed} / ${total}（${percent}%）`;
}

function resetAll(){
  if(confirm("取得済みを全部リセットしますか？")){
    done={};
    save();
    render();
  }
}

makeTabs();
render();
</script>
</body>
</html>
